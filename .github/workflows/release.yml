name: Release

on:
  push:
    tags: ['v*']
  # orchestrator 入口：dispatch 只创建 tag（CROSS_REPO_TOKEN/PAT），真正发布走 tag-push。
  # 本仓双制品：Maven lexicon(catalog-derived=asterLang) + npm @aster-cloud/ui-messages-hi
  # (literal)。tag 代表主 release line = Maven/catalog version；npm version 由 publish
  # 内部 gate 单独校验。详见 ADR 0023 阶段2。
  workflow_dispatch:
    inputs:
      version:
        description: 'Maven/catalog 主版本（不含 v；= release-plan ecosystemVersion）'
        required: false
        type: string
      package:
        description: "填 'ui-messages' 走 npm-only 独立发布，不建 tag/不发 Maven"
        required: false
        type: string
      artifactIds:
        required: false
        type: string
      trainId:
        required: false
        type: string

concurrency:
  group: release-${{ github.repository }}-${{ inputs.package && format('npm-{0}', inputs.package) || (inputs.version && format('v{0}', inputs.version) || github.ref_name) }}
  cancel-in-progress: false

jobs:
  # dispatch 路径：仅创建 tag。catalog-derived 版本用 Gradle 解析（不能 sed 字面量）。
  create-tag:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.package != 'ui-messages'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          fetch-depth: 0
      # catalog 来自 GH Packages 的 platform，settings 只声明 mavenLocal+mavenCentral →
      # 先 checkout platform 并 publishToMavenLocal，本仓 Gradle 才能解析 catalog-derived version。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-java@v5
        with: { java-version: '25', distribution: 'temurin' }
      - name: Bootstrap version catalog to Maven Local
        run: cd aster-lang-platform && ./gradlew publishToMavenLocal
      - name: Verify version & create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -z "$VERSION" ]; then
            echo "::error::workflow_dispatch catalog release requires input 'version' (npm-only uses package=ui-messages)"
            exit 1
          fi
          # catalog-derived：version = asterLibs.findVersion("asterLang")。Gradle 解析（单模块根）。
          RESOLVED=$(./gradlew -q properties | sed -n 's/^version: //p' | head -n1)
          if [ "$VERSION" != "$RESOLVED" ]; then
            echo "::error::dispatch version ($VERSION) != Gradle-resolved catalog version ($RESOLVED)"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          TAG="v${VERSION}"
          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            TAG_SHA=$(git rev-list -n1 "$TAG"); HEAD_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "::notice::$TAG already on this commit → no-op (idempotent)"; exit 0
            fi
            echo "::error::$TAG exists but points to $TAG_SHA, not HEAD $HEAD_SHA"; exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

  # npm-only 入口：ui-messages-hi 是 literal version、独立 cadence；不应为了发文案包
  # 强行推进 catalog v* tag 或重发 Maven lexicon。保持同 workflow 以复用 npm OIDC 身份。
  publish-ui-messages-npm:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.package == 'ui-messages'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish dependencies to Maven Local
        run: |
          cd aster-lang-platform && ./gradlew publishToMavenLocal
          cd ../aster-lang-core && ./gradlew publishToMavenLocal -x test

      - name: Export ui-messages-hi manifest
        run: ./gradlew exportUiMessages

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@aster-cloud'

      - name: Publish @aster-cloud/ui-messages-hi to public npm (Trusted Publisher)
        working-directory: ui-messages
        run: |
          set -o pipefail
          if npm publish --provenance --access public 2>&1 | tee /tmp/npm.log; then
            echo "ui-messages-hi published"
          elif grep -q "cannot publish over the previously published versions" /tmp/npm.log; then
            echo "ui-messages-hi 同版本已发布，跳过（幂等）"
          else
            echo "npm publish 真失败"; exit 1
          fi

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # OIDC Trusted Publishing：@aster-cloud/ui-messages-hi 发公共 npm 用 OIDC
      # （同 @aster-cloud/aster-lang-ts，无 NPM_TOKEN）。需在 npmjs.com 为该包配置
      # Trusted Publisher（关联本仓 + 本 workflow）。
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # 共享版本目录（aster-lang-platform，ADR 0012）—— core settings 依赖它，
      # 必须最先发布到 Maven Local，否则 core 构建解析不到 asterLibs。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      # hi 包无变换器、无 en 依赖 —— 只需 platform + core。
      - name: Publish dependencies to Maven Local
        run: |
          cd aster-lang-platform && ./gradlew publishToMavenLocal
          cd ../aster-lang-core && ./gradlew publishToMavenLocal -x test

      - name: Build & Test
        run: ./gradlew build verifyLexiconKeywordParity

      # 幂等容忍：GH Packages Maven 对已存在 release 版本重发返 409 Conflict。
      # 把 409 "already exists" 当幂等 no-op，让重跑能自愈（同 locales 逐包发布）。
      - name: Publish to GitHub Packages (idempotent)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          if ./gradlew publish 2>&1 | tee /tmp/pub.log; then
            echo "::notice::aster-lang-hi published"
          elif grep -qiE "received status code 409|already exists|Conflict" /tmp/pub.log; then
            echo "::notice::该版本已存在 → 幂等跳过"
          else
            echo "::error::publish 真失败"; exit 1
          fi

      # ── ui-messages manifest npm 通道（ADR 0018 统一语言包 Phase 1）──
      # Hindi 界面文案聚合产物走独立 npm 包(@aster-cloud/ui-messages-hi)，不进 JVM jar。
      # 发到**公共 npm**（与 @aster-cloud/ui-messages 同 registry），让 aster-cloud
      # 的 CI + Cloudflare Workers 构建免 GitHub Packages 认证即可消费。
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@aster-cloud'

      # 经 OIDC Trusted Publisher 发布（--provenance），无 token。幂等容忍同版本重发；
      # `set -o pipefail` 让 npm 非零退出穿透 tee，避免真失败被掩盖。
      - name: Publish @aster-cloud/ui-messages-hi to public npm (Trusted Publisher)
        working-directory: ui-messages
        run: |
          set -o pipefail
          if npm publish --provenance --access public 2>&1 | tee /tmp/npm.log; then
            echo "ui-messages-hi published"
          elif grep -q "cannot publish over the previously published versions" /tmp/npm.log; then
            echo "ui-messages-hi 同版本已发布，跳过（幂等）"
          else
            echo "npm publish 真失败"; exit 1
          fi
